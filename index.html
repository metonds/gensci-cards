  <script>
// ============ AUDIO SYNTHESIS ============
let soundEnabled = true;
let audioContext = null;

function initAudio() {
  if (!audioContext) {
    audioContext = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playSound(type) {
  if (!soundEnabled || !audioContext) return;
  
  const ctx = audioContext;
  const now = ctx.currentTime;
  
  try {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    
    switch(type) {
      case 'play':
        osc.frequency.setValueAtTime(600, now);
        osc.frequency.exponentialRampToValueAtTime(800, now + 0.1);
        gain.gain.setValueAtTime(0.1, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
        break;
      case 'pass':
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(300, now + 0.08);
        gain.gain.setValueAtTime(0.08, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.12);
        osc.start(now);
        osc.stop(now + 0.12);
        break;
      case 'win':
        const freqs = [523, 659, 784, 1047];
        freqs.forEach((freq, i) => {
          const o = ctx.createOscillator();
          const g = ctx.createGain();
          o.connect(g);
          g.connect(ctx.destination);
          o.frequency.value = freq;
          g.gain.setValueAtTime(0.1, now + i * 0.1);
          g.gain.exponentialRampToValueAtTime(0.001, now + i * 0.1 + 0.15);
          o.start(now + i * 0.1);
          o.stop(now + i * 0.1 + 0.15);
        });
        break;
      case 'error':
        osc.frequency.setValueAtTime(200, now);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.1);
        gain.gain.setValueAtTime(0.05, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
        osc.start(now);
        osc.stop(now + 0.1);
        break;
    }
  } catch(e) {
    console.log('Audio error:', e);
  }
}

function toggleSound() {
  soundEnabled = !soundEnabled;
  const btn = document.getElementById('soundToggle');
  btn.style.opacity = soundEnabled ? '1' : '0.5';
  showToast(soundEnabled ? '🔊 Sound enabled' : '🔇 Sound muted', 800);
}

const SUITS = [
  { name: 'Red', symbol: '🔴', color: '#e85d5d' },
  { name: 'Blue', symbol: '🔵', color: '#8ab4d8' },
  { name: 'Purple', symbol: '🟣', color: '#d084d0' },
  { name: 'Green', symbol: '🟢', color: '#6dc9a0' },
];

const RANKS = ['fundamentalparticles', 'atoms', 'elements', 'compounds', 'cells', 'organs', 'organsystems', 'organisms', 'ecosystems', 'planets', 'planetarysystems', 'galaxies', 'theuniverse'];

const NUM_PLAYERS = 3;
const PLAYER_INDEX = 0;
let drawPile = [];

let hands = [];
let currentPile = [];
let currentTurn = 0;
let passCount = 0;
let lastPlayedBy = -1;
let gameOver = false;
let selectedIndices = new Set();
let botDifficulties = { a: 'average', b: 'average' };
let tempBotDifficulties = { a: 'average', b: 'average' };
let currentErrorMessage = null;
let roundNumber = 1;
let scores = [0, 0, 0];
let roundWinner = null;

const difficultyDescriptions = {
  average: '😌 Average - Plays predictably, always the lowest card',
  gamer: '🎮 Gamer - Makes random strategic plays',
  master: '👑 Master - Plays optimally, tough to beat!'
};

function makeDeck() {
  const deck = [];
  for (let si = 0; si < SUITS.length; si++) {
    for (let ri = 0; ri < RANKS.length; ri++) {
      deck.push({ suit: si, rank: ri, id: `${si}-${ri}` });
    }
  }
  return deck;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

function cardValue(c) {
  return c.rank * SUITS.length + c.suit;
}

function sortHand(hand) {
  hand.sort((a, b) => cardValue(a) - cardValue(b));
}

function cardLabel(c) {
  const rankLabel = RANKS[c.rank].substring(0, 3);
  return `${rankLabel}${SUITS[c.suit].symbol}`;
}

function getComboType(cards) {
  const n = cards.length;
  if (n === 0) return null;
  
  if (n === 1) return { type: 'single', strength: cards[0].rank };
  
  if (n === 2 && cards[0].rank === cards[1].rank)
    return { type: 'pair', strength: cards[0].rank };
  
  if (n === 3 && cards[0].rank === cards[1].rank && cards[1].rank === cards[2].rank)
    return { type: 'trio', strength: cards[0].rank };
  
  if (n === 4 && cards[0].rank === cards[1].rank && cards[1].rank === cards[2].rank && cards[2].rank === cards[3].rank)
    return { type: 'fourofakind', strength: cards[0].rank };
  
  if (n >= 3 && n <= 5) {
    const sorted = [...cards].sort((a, b) => a.rank - b.rank);
    const ranks = sorted.map(c => c.rank);
    const isStraight = ranks.every((r, i) => i === 0 || r === ranks[i-1] + 1);
    
    if (isStraight) {
      const highestRank = Math.max(...ranks);
      return { type: 'run', runLength: n, strength: highestRank };
    }
  }
  
  return null;
}

function canBeat(newCards, pileCards) {
  if (pileCards.length === 0) return getComboType(newCards) !== null;
  const newCombo = getComboType(newCards);
  const oldCombo = getComboType(pileCards);
  if (!newCombo || !oldCombo) return false;

  if (newCombo.type === oldCombo.type) {
    if (newCombo.type === 'run' && newCombo.runLength !== oldCombo.runLength) return false;
    
    if (newCombo.strength !== oldCombo.strength) {
      return newCombo.strength > oldCombo.strength;
    }
    
    const newSuit = Math.min(...newCards.map(c => c.suit));
    const oldSuit = Math.min(...pileCards.map(c => c.suit));
    return newSuit < oldSuit;
  }
  
  return false;
}

function getComboDescription(cards) {
  const combo = getComboType(cards);
  if (!combo) return 'cards';
  
  if (combo.type === 'single') return 'a single card';
  if (combo.type === 'pair') return 'a pair';
  if (combo.type === 'trio') return 'a trio';
  if (combo.type === 'fourofakind') return 'four of a kind';
  if (combo.type === 'run') {
    const lengths = { 3: '3 consecutive', 4: '4 consecutive', 5: '5 consecutive' };
    return lengths[combo.runLength] || 'a run';
  }
  return 'cards';
}

function renderCard(c, index, isPlayer) {
  const s = SUITS[c.suit];
  const rankName = RANKS[c.rank].toLowerCase().replace(/\s+/g, '_');
  const suitName = s.name.toLowerCase();
  const imageUrl = `https://res.cloudinary.com/dzfgt5nko/image/upload/v1/gensci_cards/${suitName}_${rankName}.png`;
  
  const div = document.createElement('div');
  div.className = 'game-card deal-anim';
  if (isPlayer && selectedIndices.has(index)) div.classList.add('selected');
  div.style.border = '1.5px solid #333';
  div.style.boxShadow = '0 2px 8px rgba(0,0,0,0.3)';
  div.style.animationDelay = `${index * 40}ms`;
  div.style.position = 'relative';
  div.style.overflow = 'hidden';
  div.style.background = `linear-gradient(135deg, ${s.color}88, ${s.color}44)`;
  
  const img = document.createElement('img');
  img.src = imageUrl;
  img.style.width = '100%';
  img.style.height = '100%';
  img.style.objectFit = 'cover';
  img.style.borderRadius = 'inherit';
  img.loading = 'lazy';
  
  let imageLoaded = false;
  
  img.onerror = function() {
    if (!imageLoaded) {
      img.style.display = 'none';
      imageLoaded = true;
    }
  };
  
  img.onload = function() {
    div.style.background = 'none';
    imageLoaded = true;
  };
  
  div.appendChild(img);
  return div;
}

function renderPlayerHand() {
  const el = document.getElementById('playerHand');
  el.innerHTML = '';
  hands[PLAYER_INDEX].forEach((c, i) => {
    const card = renderCard(c, i, true);
    card.style.animationDelay = `${i * 40}ms`;
    card.onclick = (e) => {
      e.stopPropagation();
      if (gameOver || currentTurn !== PLAYER_INDEX) return;
      if (selectedIndices.has(i)) {
        selectedIndices.delete(i);
      } else {
        selectedIndices.add(i);
      }
      updateCardSelection();
    };
    el.appendChild(card);
  });
  document.getElementById('playerCount').textContent = `(${hands[PLAYER_INDEX].length})`;
}

function updateCardSelection() {
  hands[PLAYER_INDEX].forEach((c, i) => {
    const cards = document.querySelectorAll('#playerHand .game-card');
    if (cards[i]) {
      if (selectedIndices.has(i)) {
        cards[i].classList.add('selected');
      } else {
        cards[i].classList.remove('selected');
      }
    }
  });
}

function renderOpponents() {
  [1,2].forEach((pi, bi) => {
    const countId = ['botACount','botBCount'][bi];
    const tagId = ['botADiffTag','botBDiffTag'][bi];
    const countEl = document.getElementById(countId);
    const tagEl = document.getElementById(tagId);
    
    if (!hands[pi]) return;
    countEl.textContent = hands[pi].length;
    
    const diff = botDifficulties[bi === 0 ? 'a' : 'b'];
    const icons = { average: '😌', gamer: '🎮', master: '👑' };
    tagEl.textContent = icons[diff];
    tagEl.style.color = diff === 'master' ? '#e2c97e' : '#a8d5ba';
  });
}

function renderPile() {
  const el = document.getElementById('pileCards');
  el.innerHTML = '';
  if (currentPile.length === 0) {
    el.innerHTML = '<span style="color:#4a6a8a;font-size:20px;font-weight:bold;">No cards played yet</span>';
    return;
  }
  currentPile.forEach((c, i) => {
    const card = renderCard(c, i, false);
    card.classList.remove('game-card', 'deal-anim');
    card.classList.add('slide-in-pile');
    card.style.width = '120px';
    card.style.height = '168px';
    card.style.cursor = 'default';
    card.style.flexShrink = '0';
    card.style.borderRadius = '12px';
    card.style.position = 'relative';
    card.style.margin = '0 6px';
    card.style.animationDelay = `${i * 100}ms`;
    el.appendChild(card);
  });
}

function updateTurnIndicator() {
  const el = document.getElementById('turnIndicator');
  if (gameOver) return;
  const names = ['Your', "Bot A's", "Bot B's"];
  el.textContent = `${names[currentTurn]} turn`;
  el.style.color = currentTurn === PLAYER_INDEX ? '#e2c97e' : '#8ab4d8';
  el.classList.remove('turn-transition');
  void el.offsetWidth;
  el.classList.add('turn-transition');
}

function showToast(msg, duration = 1800, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (isError) {
    t.classList.add('error');
    currentErrorMessage = msg;
  } else {
    t.classList.remove('error');
    if (currentErrorMessage) {
      currentErrorMessage = null;
    } else {
      setTimeout(() => t.classList.remove('show'), duration);
    }
  }
}

function openDifficultyModal() {
  tempBotDifficulties = { ...botDifficulties };
  document.getElementById('difficultyModal').style.display = 'flex';
  updateDifficultyDescription('average');
  lucide.createIcons();
}

function selectBotDifficulty(bot, difficulty) {
  tempBotDifficulties[bot] = difficulty;
  updateDifficultyDescription(difficulty);
  
  document.querySelectorAll('.difficulty-btn').forEach(btn => {
    const btnBot = btn.getAttribute('data-bot');
    const btnDiff = btn.getAttribute('data-diff');
    const isSelected = tempBotDifficulties[btnBot] === btnDiff;
    btn.style.background = isSelected ? '#4a8a6f' : '#1a2e2455';
    btn.style.color = isSelected ? '#f0f8f0' : '#7ec9a1';
    btn.style.borderColor = isSelected ? '#a8d5ba' : '#4a8a6f';
  });
}

function updateDifficultyDescription(difficulty) {
  document.getElementById('diffDescriptor').textContent = difficultyDescriptions[difficulty];
}

function confirmDifficulties() {
  botDifficulties = { ...tempBotDifficulties };
  document.getElementById('difficultyModal').style.display = 'none';
  roundNumber = 1;
  scores = [0, 0, 0];
  roundWinner = null;
  startGame();
}

function startGame() {
  gameOver = false;
  selectedIndices.clear();
  currentPile = [];
  passCount = 0;
  lastPlayedBy = -1;
  document.getElementById('lastAction').textContent = '';

  const deck = shuffle(makeDeck());
  const CARDS_PER_PLAYER = 11;
  hands = [];
  for (let i = 0; i < NUM_PLAYERS; i++) {
    hands.push(deck.slice(i * CARDS_PER_PLAYER, (i + 1) * CARDS_PER_PLAYER));
    sortHand(hands[i]);
  }
  
  drawPile = deck.slice(NUM_PLAYERS * CARDS_PER_PLAYER);

  let lowestVal = Infinity, starter = 0;
  hands.forEach((h, i) => {
    if (h.length && cardValue(h[0]) < lowestVal) {
      lowestVal = cardValue(h[0]);
      starter = i;
    }
  });
  currentTurn = starter;

  renderAll();
  showToast('New game started!');

  if (currentTurn !== PLAYER_INDEX) {
    setTimeout(() => {
      while (currentTurn !== PLAYER_INDEX && !gameOver && hands[currentTurn].length > 0) {
        botTurn();
      }
    }, 400);
  }
}

function startNextRound() {
  roundNumber++;
  gameOver = false;
  selectedIndices.clear();
  currentPile = [];
  passCount = 0;
  lastPlayedBy = -1;
  roundWinner = null;
  document.getElementById('lastAction').textContent = '';

  const deck = shuffle(makeDeck());
  const CARDS_PER_PLAYER = 11;
  hands = [];
  for (let i = 0; i < NUM_PLAYERS; i++) {
    hands.push(deck.slice(i * CARDS_PER_PLAYER, (i + 1) * CARDS_PER_PLAYER));
    sortHand(hands[i]);
  }
  
  drawPile = deck.slice(NUM_PLAYERS * CARDS_PER_PLAYER);

  let lowestVal = Infinity, starter = 0;
  hands.forEach((h, i) => {
    if (h.length && cardValue(h[0]) < lowestVal) {
      lowestVal = cardValue(h[0]);
      starter = i;
    }
  });
  currentTurn = starter;

  renderAll();
  showToast(`Round ${roundNumber} starting...`);

  if (currentTurn !== PLAYER_INDEX) setTimeout(botTurn, 300);
}

function showGameOver() {
  const names = ['You', 'Bot A', 'Bot B'];
  const winner = scores.indexOf(Math.max(...scores));
  
  document.getElementById('turnIndicator').textContent = `🏆 ${names[winner]} wins the match!`;
  document.getElementById('turnIndicator').style.color = '#e2c97e';
  
  triggerConfetti();
  showToast(`Game Over! ${names[winner]} ${winner === 0 ? 'win' : 'wins'} with ${scores[winner]} points! 🎉`, 5000);
}

function renderAll() {
  renderPlayerHand();
  renderOpponents();
  renderPile();
  updateTurnIndicator();
  document.getElementById('drawPileDisplay').textContent = drawPile.length;
  document.getElementById('roundDisplay').textContent = roundNumber;
  document.getElementById('scorePlayer').textContent = scores[0];
  document.getElementById('scoreBotA').textContent = scores[1];
  document.getElementById('scoreBotB').textContent = scores[2];
}

function toggleDrawPileModal() {
  const modal = document.getElementById('drawPileModal');
  const isVisible = modal.style.display !== 'none';
  modal.style.display = isVisible ? 'none' : 'flex';
  
  if (!isVisible) {
    renderDrawPileModal();
  }
}

function renderDrawPileModal() {
  const container = document.getElementById('drawPileContent');
  container.innerHTML = '';
  
  if (drawPile.length === 0) {
    container.innerHTML = '<span style="color:#6ba98f; font-size:14px;">No cards remaining</span>';
    return;
  }
  
  const sorted = [...drawPile].sort((a, b) => {
    if (a.suit !== b.suit) return a.suit - b.suit;
    return a.rank - b.rank;
  });
  
  sorted.forEach((c, idx) => {
    const card = renderCard(c, idx, false);
    card.classList.remove('game-card');
    card.style.width = '60px';
    card.style.height = '84px';
    card.style.cursor = 'default';
    card.style.flexShrink = '0';
    card.style.borderRadius = '6px';
    card.style.fontSize = '11px';
    container.appendChild(card);
  });
}

function playSelected() {
  if (gameOver || currentTurn !== PLAYER_INDEX) return;
  if (selectedIndices.size === 0) { showToast('Select cards to play'); return; }
  const cards = [...selectedIndices].sort((a,b) => a-b).map(i => hands[PLAYER_INDEX][i]);

  if (currentPile.length === 0 && lastPlayedBy === -1) {
    const lowestCard = hands[PLAYER_INDEX][0];
    if (!cards.find(c => c.id === lowestCard.id)) {
      showToast('First turn: must include your lowest card', Infinity, true);
      return;
    }
  }

  if (currentPile.length > 0) {
    if (cards.length !== currentPile.length) {
      showToast(`Must play ${currentPile.length} card${currentPile.length > 1 ? 's' : ''}`, Infinity, true);
      return;
    }
    if (!canBeat(cards, currentPile)) {
      showToast('Invalid play — must beat the current combo', Infinity, true);
      return;
    }
  }

  initAudio();
  playSound('play');
  currentErrorMessage = null;
  const t = document.getElementById('toast');
  t.classList.remove('show');
  t.textContent = '';

  const playerHandCards = document.querySelectorAll('#playerHand .game-card');
  [...selectedIndices].sort((a,b) => b-a).forEach(i => {
    if (playerHandCards[i]) {
      playerHandCards[i].classList.add('card-flip');
    }
  });

  const cardsPlayedCount = selectedIndices.size;
  
  animatePlayerCardsToPile(cards);
  
  const cardsToRemove = [...selectedIndices].sort((a,b) => b-a);
  cardsToRemove.forEach(i => hands[PLAYER_INDEX].splice(i, 1));
  
  currentPile = cards;
  lastPlayedBy = PLAYER_INDEX;
  passCount = 0;
  selectedIndices.clear();
  document.getElementById('lastAction').textContent = `You played ${getComboDescription(cards)}`;

  replenishHand(PLAYER_INDEX, cardsPlayedCount);
  
  if (checkWin(PLAYER_INDEX)) return;
  advanceTurn();
  renderAll();
  if (currentTurn !== PLAYER_INDEX) {
    setTimeout(() => botTurn(), 2800);
  }
}

function passTurn() {
  if (gameOver || currentTurn !== PLAYER_INDEX) return;
  if (currentPile.length === 0 && lastPlayedBy === PLAYER_INDEX) {
    showToast("You must play — it's a free turn");
    return;
  }
  if (currentPile.length === 0 && lastPlayedBy === -1 && currentTurn === PLAYER_INDEX) {
    showToast("You must play the first card");
    return;
  }
  initAudio();
  playSound('pass');
  passCount++;
  document.getElementById('lastAction').textContent = 'You passed';
  selectedIndices.clear();
  checkPassReset();
  advanceTurn();
  renderAll();
  if (currentTurn !== PLAYER_INDEX) {
    while (currentTurn !== PLAYER_INDEX && !gameOver && hands[currentTurn].length > 0) {
      botTurn();
    }
  }
}

function advanceTurn() {
  do {
    currentTurn = (currentTurn + 1) % NUM_PLAYERS;
  } while (hands[currentTurn].length === 0 && !gameOver);
}

function checkPassReset() {
  const active = hands.filter(h => h.length > 0).length;
  if (passCount >= active - 1) {
    currentPile = [];
    passCount = 0;
  }
}

function checkWin(pi) {
  if (hands[pi].length === 0 && drawPile.length === 0) {
    gameOver = true;
    
    let roundPoints = 0;
    hands.forEach((hand, idx) => {
      if (idx !== pi) {
        hand.forEach(card => {
          roundPoints += (card.rank + 1);
        });
      }
    });
    
    roundWinner = pi;
    scores[pi] += roundPoints;
    
    const names = ['You', 'Bot A', 'Bot B'];
    document.getElementById('turnIndicator').textContent = `🏆 ${names[pi]} won Round ${roundNumber}!`;
    document.getElementById('turnIndicator').style.color = '#e2c97e';
    renderAll();
    triggerConfetti();
    showToast(`${names[pi]} ${pi === 0 ? 'win' : 'wins'} Round ${roundNumber}! (+${roundPoints} points) 🎉`, 3000);
    
    if (roundNumber === 4) {
      setTimeout(showGameOver, 2500);
    } else {
      setTimeout(startNextRound, 3000);
    }
    
    return true;
  }
  return false;
}

function replenishHand(pi, cardsPlayed) {
  const cardsNeeded = cardsPlayed;
  let cardsAdded = 0;
  while (cardsAdded < cardsNeeded && drawPile.length > 0) {
    hands[pi].push(drawPile.shift());
    cardsAdded++;
  }
  sortHand(hands[pi]);
}

function doPass(pi, name) {
  passCount++;
  const passIndicator = ` (${name} passed)`;
  const currentText = document.getElementById('lastAction').textContent;
  if (!currentText.includes('passed')) {
    document.getElementById('lastAction').textContent += passIndicator;
  }
  checkPassReset();
  advanceTurn();
  renderAll();
  if (currentTurn !== PLAYER_INDEX) botTurn();
}

function triggerConfetti() {
  initAudio();
  playSound('win');
  const emojis = ['🎉', '✨', '🎊', '⭐', '🌟'];
  for (let i = 0; i < 40; i++) {
    const confetti = document.createElement('div');
    confetti.className = 'confetti';
    confetti.textContent = emojis[Math.floor(Math.random() * emojis.length)];
    confetti.style.left = Math.random() * 100 + '%';
    confetti.style.animationDelay = Math.random() * 0.4 + 's';
    document.body.appendChild(confetti);
    setTimeout(() => confetti.remove(), 2800);
  }
}

function showBotReaction(botElement, reaction) {
  const emoji = document.createElement('div');
  emoji.className = 'emoji-reaction';
  emoji.textContent = reaction;
  emoji.style.left = Math.random() * 40 + 30 + '%';
  emoji.style.top = '10%';
  botElement.style.position = 'relative';
  botElement.appendChild(emoji);
  setTimeout(() => emoji.remove(), 1300);
}

function animatePlayerCardsToPile(cards) {
  const pileContainer = document.getElementById('pileCards');
  const pileRect = pileContainer.getBoundingClientRect();
  const handArea = document.getElementById('playerHand');
  
  cards.forEach((card, idx) => {
    const cardElements = document.querySelectorAll('#playerHand .game-card');
    const selectedCardElements = [...selectedIndices].sort((a,b) => a-b).map(i => cardElements[i]);
    const cardElement = selectedCardElements[idx];
    
    if (cardElement) {
      const cardRect = cardElement.getBoundingClientRect();
      
      const animCard = document.createElement('div');
      animCard.className = 'card-to-discard';
      animCard.style.width = '120px';
      animCard.style.height = '168px';
      animCard.style.borderRadius = '12px';
      animCard.style.left = cardRect.left + 'px';
      animCard.style.top = cardRect.top + 'px';
      animCard.style.background = `linear-gradient(135deg, ${SUITS[card.suit].color}88, ${SUITS[card.suit].color}44)`;
      animCard.style.border = '1.5px solid #333';
      animCard.style.animationDelay = `${idx * 150}ms`;
      
      const img = document.createElement('img');
      img.src = `https://res.cloudinary.com/dzfgt5nko/image/upload/v1/gensci_cards/${SUITS[card.suit].name.toLowerCase()}_${RANKS[card.rank].toLowerCase().replace(/\s+/g, '_')}.png`;
      img.style.width = '100%';
      img.style.height = '100%';
      img.style.objectFit = 'cover';
      img.style.borderRadius = 'inherit';
      img.loading = 'lazy';
      img.onerror = () => img.style.display = 'none';
      
      animCard.appendChild(img);
      animCard.style.setProperty('--pile-x', (pileRect.left - cardRect.left) + 'px');
      animCard.style.setProperty('--pile-y', (pileRect.top - cardRect.top) + 'px');
      
      document.body.appendChild(animCard);
      
      setTimeout(() => animCard.remove(), 3000);
    }
  });
}

    img.style.width = '100%';

    document.body.appendChild(animCard);
    
    setTimeout(() => animCard.remove(), 3000);
  });
}

function botTurn() {
  if (gameOver || currentTurn === PLAYER_INDEX) return;
  const pi = currentTurn;
  const hand = hands[pi];
  const names = ['You','Bot A','Bot B'];
  const difficulty = botDifficulties[pi - 1];
  const botElement = pi === 1 ? document.querySelector('#botACount').parentElement : document.querySelector('#botBCount').parentElement;

  let play = null;

  if (currentPile.length === 0 && lastPlayedBy === -1) {
    play = [hand[0]];
  }
  else if (currentPile.length === 0) {
    if (difficulty === 'master') {
      const midIdx = Math.floor(hand.length / 2);
      play = [hand[midIdx]];
    } else if (difficulty === 'gamer') {
      play = Math.random() > 0.3 ? [hand[1]] || [hand[0]] : [hand[0]];
    } else {
      play = [hand[0]];
    }
  } 
  else {
    const pileType = getComboType(currentPile);
    if (!pileType) { doPass(pi, names[pi]); return; }

    const validPlays = [];
    const pileLen = currentPile.length;

    if (pileLen === 1) {
      for (const c of hand) {
        if (canBeat([c], currentPile)) validPlays.push([c]);
      }
    } else if (pileLen === 2) {
      for (let i = 0; i < hand.length - 1; i++) {
        if (hand[i].rank === hand[i+1].rank && canBeat([hand[i], hand[i+1]], currentPile)) {
          validPlays.push([hand[i], hand[i+1]]);
        }
      }
    } else if (pileLen === 3) {
      for (let i = 0; i < hand.length - 2; i++) {
        if (hand[i].rank === hand[i+1].rank && hand[i+1].rank === hand[i+2].rank &&
            canBeat([hand[i], hand[i+1], hand[i+2]], currentPile)) {
          validPlays.push([hand[i], hand[i+1], hand[i+2]]);
        }
      }
    } else if (pileLen === 4) {
      for (let i = 0; i < hand.length - 3; i++) {
        if (hand[i].rank === hand[i+1].rank && hand[i+1].rank === hand[i+2].rank && hand[i+2].rank === hand[i+3].rank &&
            canBeat([hand[i], hand[i+1], hand[i+2], hand[i+3]], currentPile)) {
          validPlays.push([hand[i], hand[i+1], hand[i+2], hand[i+3]]);
        }
      }
    } else if (pileLen >= 3 && pileLen <= 5) {
      for (let i = 0; i <= hand.length - pileLen; i++) {
        const candidate = hand.slice(i, i + pileLen);
        if (getComboType(candidate)?.type === 'run' && canBeat(candidate, currentPile)) {
          validPlays.push(candidate);
        }
      }
    }

    if (validPlays.length > 0) {
      if (difficulty === 'master') {
        play = validPlays.reduce((a, b) => {
          const aRank = getComboType(a).strength;
          const bRank = getComboType(b).strength;
          return aRank > bRank ? a : b;
        });
        showBotReaction(botElement, '💪');
      } else if (difficulty === 'gamer') {
        if (Math.random() < 0.6) {
          play = validPlays.reduce((a, b) => {
            const aRank = getComboType(a).strength;
            const bRank = getComboType(b).strength;
            return aRank > bRank ? a : b;
          });
        } else {
          play = validPlays[Math.floor(Math.random() * validPlays.length)];
        }
        showBotReaction(botElement, '🎯');
      } else {
        if (Math.random() < 0.3) {
          play = validPlays.reduce((a, b) => {
            const aRank = getComboType(a).strength;
            const bRank = getComboType(b).strength;
            return aRank > bRank ? a : b;
          });
        } else {
          play = validPlays[0];
        }
        showBotReaction(botElement, '🤔');
      }
    }
  }

  if (!play) { doPass(pi, names[pi]); return; }

  animateCardsToPile(pi, play);

  const cardsPlayedCount = play.length;
  play.forEach(pc => {
    const idx = hand.findIndex(c => c.id === pc.id);
    if (idx >= 0) hand.splice(idx, 1);
  });
  currentPile = play;
  lastPlayedBy = pi;
  passCount = 0;
  document.getElementById('lastAction').textContent = `${names[pi]} played ${getComboDescription(play)}`;

  replenishHand(pi, cardsPlayedCount);

  if (checkWin(pi)) return;
  advanceTurn();
  renderAll();
  if (currentTurn !== PLAYER_INDEX) {
    setTimeout(() => {
      while (currentTurn !== PLAYER_INDEX && !gameOver && hands[currentTurn].length > 0) {
        botTurn();
      }
    }, 2800);
  }
}

const defaultConfig = {
  game_title: 'GenSci Cards',
  bot_a_difficulty: 'average',
  bot_b_difficulty: 'average',
  background_color: '#1a3a2a',
  surface_color: '#3d6b4f',
  text_color: '#a8d5ba',
  primary_action_color: '#5eb35f',
  secondary_action_color: '#7ec9a1'
};

function applyConfig(config) {
  const bg = config.background_color || defaultConfig.background_color;
  const surface = config.surface_color || defaultConfig.surface_color;
  const text = config.text_color || defaultConfig.text_color;
  const primary = config.primary_action_color || defaultConfig.primary_action_color;
  const secondary = config.secondary_action_color || defaultConfig.secondary_action_color;
  const font = config.font_family || 'Cinzel';
  const fontSize = config.font_size || 16;
  const title = config.game_title || defaultConfig.game_title;

  document.body.style.background = `linear-gradient(160deg, ${bg} 0%, ${surface} 40%, ${adjustColor(surface, 20)} 100%)`;
  document.getElementById('gameTitle').textContent = title;
  document.getElementById('gameTitle').style.color = text;
  document.getElementById('gameTitle').style.fontFamily = `${font}, Cinzel, serif`;
  document.getElementById('gameTitle').style.fontSize = `${fontSize * 1.3}px`;

  document.getElementById('btnNewGame').style.background = `${text}22`;
  document.getElementById('btnNewGame').style.color = text;
  document.getElementById('btnNewGame').style.borderColor = `${text}55`;

  document.getElementById('btnPlay').style.background = `linear-gradient(135deg, ${primary}, ${adjustColor(primary, -20)})`;
  document.getElementById('btnPass').style.color = secondary;
  document.getElementById('btnPass').style.borderColor = `${secondary}55`;

  document.getElementById('turnIndicator').style.color = secondary;
  document.querySelectorAll('[style*="color:#6ba98f"]').forEach(el => el.style.color = secondary);
}

function adjustColor(hex, amt) {
  let c = hex.replace('#','');
  let r = Math.min(255, Math.max(0, parseInt(c.substr(0,2),16) + amt));
  let g = Math.min(255, Math.max(0, parseInt(c.substr(2,2),16) + amt));
  let b = Math.min(255, Math.max(0, parseInt(c.substr(4,2),16) + amt));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

window.elementSdk.init({
  defaultConfig,
  onConfigChange: async (config) => {
    soundEnabled = config.sound_enabled !== 'false';

  mapToCapabilities: (config) => ({

      { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
      { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
      { get: () => config.secondary_action_color || defaultConfig.secondary_action_color, set: (v) => { config.secondary_action_color = v; window.elementSdk.setConfig({ secondary_action_color: v }); } },
    ],
    borderables: [],
    fontEditable: {
      get: () => config.font_family || defaultConfig.font_family || 'Cinzel',
      set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
    },
    fontSizeable: {
      get: () => config.font_size || defaultConfig.font_size || 16,
      set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
    }
  }),
  mapToEditPanelValues: (config) => new Map([
    ['game_title', config.game_title || defaultConfig.game_title],
    ['bot_a_difficulty', config.bot_a_difficulty || defaultConfig.bot_a_difficulty],
    ['bot_b_difficulty', config.bot_b_difficulty || defaultConfig.bot_b_difficulty],
    ['sound_enabled', config.sound_enabled !== 'false' ? 'true' : 'false']
  ])
});
